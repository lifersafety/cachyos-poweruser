name: Build cachyos-poweruser ISOs

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      profile:
        description: 'ISO profile to build'
        required: true
        default: 'kde-offline'
        type: choice
        options: [kde-offline, kde-online]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout cachyos-poweruser
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso squashfs-tools xorriso git curl \
            python rsync dialog

      - name: Set up CachyOS keyring
        run: |
          curl -fsSL https://mirror.cachyos.org/cachyos-keyring.tar.xz | tar -xJ
          pacman-key --add cachyos-keyring/cachyos.gpg || true
          pacman -U --noconfirm cachyos-keyring/*.pkg.tar.zst || true

      - name: Determine profile to build
        id: profile
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "profile=${{ inputs.profile }}" >> $GITHUB_OUTPUT
          else
            echo "profile=kde-offline" >> $GITHUB_OUTPUT
          fi

      - name: Build ISO
        run: |
          mkdir -p /work/out
          sudo bash build/build-iso.sh \
            --profile ${{ steps.profile.outputs.profile }} \
            --method  native \
            --outdir  /work/out

      - name: Generate checksums
        run: |
          cd /work/out
          sha256sum *.iso > SHA256SUMS.txt
          ls -lh *.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-poweruser-${{ steps.profile.outputs.profile }}
          path: /work/out/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /work/out/*.iso
            /work/out/SHA256SUMS.txt
          body: |
            ## cachyos-poweruser ${{ github.ref_name }}

            KDE Plasma offline+online installer based on official CachyOS.

            **What's different from official CachyOS:**
            - KDE packages bundled for offline install (~4.5 GB)
            - LibreOffice removed (saves ~600 MB)
            - Calamares: two shellprocess steps added for offline detection/cleanup
            - New-Cli-Installer: wrapped with offline repo activation

            **SHA256 checksums:** See `SHA256SUMS.txt`

            **Write to USB:**
            ```bash
            sudo dd if=cachyos-poweruser-*.iso of=/dev/sdX bs=4M status=progress oflag=sync
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
